services:
  # ── Infrastructure ───────────────────────────────────────────────────────────
  postgres:
    container_name: postgres_db
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: papers_db
    ports:
      - "5444:5432"
    volumes:
      - postgres_data_v2:/var/lib/postgresql/data
      - ./services/postgres_vector/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d papers_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  neo4j:
    container_name: neo4j_db
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/secretpassword
    ports:
      - "7474:7474" # Browser UI
      - "7687:7687" # Bolt
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  redis:
    container_name: redis
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - app-network

  minio:
    container_name: minio
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000" # API
      - "9001:9001" # Console UI
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  ollama:
    container_name: ollama
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: /bin/sh
    #command: -c "ollama serve & sleep 5 && ollama pull llama3 && wait"
    #command: -c "ollama serve & sleep 5 && ollama pull gemma4 && wait"
    #command: -c "ollama serve & sleep 5 && ollama pull llama3 && ollama pull gemma4:e2b && ollama pull nomic-embed-text && wait"
    command: >
      -c "ollama serve & 
      sleep 5; 
      ollama list | grep -q 'gemma4:e2b' || ollama pull gemma4:e2b; 
      ollama list | grep -q 'nomic-embed-text' || ollama pull nomic-embed-text; 
      wait"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  rabbitmq:
    container_name: rabbitmq
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672" # Port do komunikacji dla Workera w Pythonie
      - "15672:15672" # Panel webowy RabbitMQ (Dashboard)
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - app-network

  # ── Application Services ─────────────────────────────────────────────────────
  scraper:
    container_name: scraper
    build:
      context: ./services/scraper
    env_file: ./services/scraper/.env.example
    environment:
      MINIO_ENDPOINT: minio:9000
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - app-network

  processor:
    container_name: processor
    build:
      context: ./services/processor
    env_file: ./services/processor/.env.example
    environment:
      MINIO_ENDPOINT: minio:9000
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      REDIS_URL: redis://redis:6379
      NEO4J_URI: bolt://neo4j:7687
      LLM_BASE_URL: http://ollama:11434
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - app-network

  #llm:
  #  build:
  #    context: ./services/llm
  #  env_file: ./services/llm/.env.example
  #  environment:
  #    OLLAMA_BASE_URL: http://ollama:11434
  #  ports:
  #    - "8000:8000"
  #  depends_on:
  #    - ollama
  #  networks:
  #    - app-network

  backend:
    container_name: backend
    build:
      context: ./backend
    env_file: ./backend/.env.example
    environment:
      - PORT=4000
      - POSTGRES_URL=postgresql://user:password@postgres:5432/papers_db
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=secretpassword
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - app-network

  frontend:
    container_name: frontend
    build:
      context: ./frontend
      #dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  postgres_data_v2:
  neo4j_data:
  redis_data:
  minio_data:
  ollama_data:
  rabbitmq_data:

networks:
  app-network:
    driver: bridge
